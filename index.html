<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hourly</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0d0f;color:#e8f0ea;font-family:'DM Mono',monospace;min-height:100vh}
input,select,button{font-family:'DM Mono',monospace}
button{cursor:pointer}
button:active{opacity:.7}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#1e2830;border-radius:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* layout */
#header{position:sticky;top:0;z-index:100;background:#111518;border-bottom:1px solid #1e2830;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#logo{display:flex;align-items:center;gap:8px;margin-right:auto}
#logo-mark{width:28px;height:28px;background:#00e5a0;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#0a0d0f}
#logo-text{font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
#clock-wrap{font-size:12px;color:#00e5a0;display:flex;align-items:center;gap:6px}
#pulse{width:6px;height:6px;border-radius:50%;background:#00e5a0;animation:pulse 2s infinite}
#nav{display:flex;gap:4px;overflow-x:auto;width:100%}
#nav::-webkit-scrollbar{display:none}
.nav-btn{padding:6px 12px;border-radius:4px;border:none;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;background:transparent;color:#8a9e90;white-space:nowrap;transition:all .2s}
.nav-btn.active{background:#00e5a018;color:#00e5a0}

#main{padding:16px;max-width:1100px;margin:0 auto}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#161c21;border:1px solid #1e2830;border-radius:10px;padding:14px 16px}
.stat-card.warn{border-color:#ff6b3580}
.stat-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8a9e90;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:700;color:#00e5a0;line-height:1}
.stat-card.warn .stat-value{color:#ff6b35}
.stat-card.gold .stat-value{color:#ffd166}

/* section title */
.sec{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8a9e90;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.sec-line{flex:1;height:1px;background:#1e2830}

/* employee grid */
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.emp-card{background:#161c21;border:1px solid #1e2830;border-radius:12px;padding:18px;position:relative;overflow:hidden;transition:border-color .3s;animation:fadein .3s ease}
.emp-card.active-card{border-color:#00e5a060}
.emp-card.ot-card{border-color:#ff6b3580}
.emp-top-bar{position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0}
.ot-banner{background:#ff6b3518;border:1px solid #ff6b3560;border-radius:8px;padding:7px 11px;margin-bottom:12px;font-size:11px;color:#ff6b35;font-weight:600}
.emp-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.emp-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.emp-name{font-size:13px;font-weight:700;color:#e8f0ea}
.emp-role{font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;font-weight:600}
.emp-badge{margin-left:auto;padding:3px 9px;border-radius:20px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;white-space:nowrap}
.badge-active{background:#00e5a018;color:#00e5a0;border:1px solid #00e5a060}
.badge-offline{background:#ffffff08;color:#8a9e90;border:1px solid #1e2830}
.badge-ot{background:#ff6b3518;color:#ff6b35;border:1px solid #ff6b3560}

.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.time-cell{background:#111518;border:1px solid #1e2830;border-radius:8px;padding:10px 11px}
.time-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8a9e90;margin-bottom:3px}
.time-val{font-size:15px;font-weight:700;color:#00e5a0;font-variant-numeric:tabular-nums}
.time-val.sm{font-size:12px;font-weight:500;color:#e8f0ea}
.time-val.warn{color:#ff6b35}
.time-val.gold{font-size:13px;font-weight:600;color:#ffd166}

.btn-row{display:flex;gap:8px}
.btn{flex:1;padding:9px 0;border-radius:8px;border:none;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;transition:all .15s}
.btn-primary{background:#00e5a0;color:#0a0d0f}
.btn-secondary{background:#00e5a018;color:#00e5a0}
.btn-danger{background:#ff6b3518;color:#ff6b35;flex:0 0 38px!important}
.btn-blue{background:#4facfe18;color:#4facfe}
.btn-gold{background:#ffd16618;color:#ffd166}
.btn-sm{flex:none;padding:3px 8px;border-radius:4px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;border:none}

/* table */
.tbl{background:#161c21;border:1px solid #1e2830;border-radius:12px;overflow:hidden}
.tbl-head{display:grid;padding:11px 18px;border-bottom:1px solid #1e2830;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#8a9e90;font-weight:700}
.tbl-row{display:grid;padding:12px 18px;border-bottom:1px solid #1e2830;font-size:12px;align-items:center}
.tbl-row:nth-child(even){background:rgba(17,21,24,.5)}
.tbl-row:last-child{border-bottom:none}
.tbl-total{display:grid;padding:13px 18px;border-top:2px solid #1e2830;background:#111518;font-size:12px;align-items:center;font-weight:700}
.cols-log{grid-template-columns:1.3fr .9fr .8fr 1.1fr .7fr .7fr}
.cols-pay{grid-template-columns:1.3fr .9fr .9fr .9fr .9fr .9fr}
.cols-mon{grid-template-columns:1.3fr .9fr 1fr .9fr 1fr}
.cols-req{grid-template-columns:1.3fr .9fr .9fr 1fr .9fr}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* forms */
.form-box{background:#161c21;border:1px solid #1e2830;border-radius:12px;padding:22px;max-width:480px;margin:0 auto}
.form-box.wide{max-width:680px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#8a9e90;margin-bottom:7px;display:block}
input,select{width:100%;padding:10px 12px;background:#111518;border:1px solid #1e2830;border-radius:8px;color:#e8f0ea;font-size:13px;font-family:‘DM Mono’,monospace;margin-bottom:14px}
input:focus,select:focus{border-color:#00e5a060;outline:none}
select{appearance:none}
.empty{text-align:center;color:#8a9e90;padding:60px 0;font-size:13px}

/* status pills */
.pill{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.pill-pending{background:#ffd16618;color:#ffd166;border:1px solid #ffd16660}
.pill-approved{background:#00e5a018;color:#00e5a0;border:1px solid #00e5a060}
.pill-declined{background:#ff6b3518;color:#ff6b35;border:1px solid #ff6b3560}

/* tip modal */
#tip-modal{display:none;position:fixed;inset:0;background:#000c;z-index:999;align-items:center;justify-content:center;padding:20px}
#tip-modal.show{display:flex}
#tip-box{background:#161c21;border:1px solid #1e2830;border-radius:14px;padding:26px;width:100%;max-width:340px;animation:fadein .2s ease}

/* export btn */
.export-btn{padding:6px 14px;border-radius:8px;border:1px solid #00e5a060;background:#00e5a018;color:#00e5a0;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;cursor:pointer}

@media(max-width:600px){
.stats{grid-template-columns:1fr 1fr}
.emp-grid{grid-template-columns:1fr}
.cols-log,.cols-pay,.cols-mon,.cols-req{grid-template-columns:1.3fr .9fr .9fr;font-size:11px;padding:10px 12px}
.cols-log .h3,.cols-log .h4,.cols-log .h5,
.cols-pay .h3,.cols-pay .h5,
.cols-mon .h3,
.cols-req .h3{display:none}
.form-grid{grid-template-columns:1fr}
}
</style>

</head>
<body>

<!-- Tip Modal -->

<div id="tip-modal">
  <div id="tip-box">
    <div style="font-size:14px;font-weight:700;color:#e8f0ea;margin-bottom:6px">Log Tips 💰</div>
    <div id="tip-name" style="font-size:11px;color:#8a9e90;margin-bottom:18px"></div>
    <label>Amount ($)</label>
    <input type="number" id="tip-input" min="0" step="0.01" placeholder="0.00" style="font-size:18px;margin-bottom:18px"/>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="saveTips(0)" style="flex:1">No Tips</button>
      <button class="btn btn-gold" onclick="saveTips()" style="flex:1">Save Tips</button>
    </div>
  </div>
</div>

<!-- Header -->

<div id="header">
  <div id="logo">
    <div id="logo-mark">H</div>
    <span id="logo-text">Hourly</span>
  </div>
  <div id="clock-wrap"><div id="pulse"></div><span id="clock">--:--:--</span></div>
  <div id="nav">
    <button class="nav-btn active" onclick="goto('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="goto('log')">Log</button>
    <button class="nav-btn" onclick="goto('payroll')">Payroll</button>
    <button class="nav-btn" onclick="goto('monthly')">Monthly</button>
    <button class="nav-btn" id="req-btn" onclick="goto('requests')">Requests</button>
    <button class="nav-btn" onclick="goto('add')">+ Staff</button>
  </div>
</div>

<div id="main"></div>

<script>
// ── state ──────────────────────────────────────────────────────────────
const ROLES    = ["Kitchen","Front of House","Bar","Manager","Host","Delivery"];
const PALETTES = ["#00e5a0","#4facfe","#f093fb","#ffd166","#ff6b35","#a8edea","#c471ed"];
const ROLE_CLR = {"Kitchen":"#ff6b35","Front of House":"#4facfe","Bar":"#f093fb","Manager":"#ffd166","Host":"#a8edea","Delivery":"#c471ed"};
const OT_MS    = 40*3600*1000;
const MONTHS   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function load(key, def){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):def; }catch{ return def; } }
function save(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch{} }

let employees = load("h_emps", [
  {id:1,name:"Aria Chen",  role:"Kitchen",       color:"#00e5a0",rate:15},
  {id:2,name:"Marcus Webb",role:"Front of House",color:"#4facfe",rate:13},
  {id:3,name:"Sofia Reyes",role:"Bar",           color:"#f093fb",rate:14},
]);
let sessions  = load("h_sess", {});
let active    = load("h_active", {});
let requests  = load("h_reqs", []);
let view      = "dashboard";
let tipTarget = null;
let monthSel  = new Date().getMonth();
let yearSel   = new Date().getFullYear();

// clean stale active sessions (>12h)
const now = Date.now();
Object.keys(active).forEach(id=>{ if(now - active[id] > 12*3600*1000) delete active[id]; });
save("h_active", active);

// ── helpers ────────────────────────────────────────────────────────────
const fmt   = ms=>{ if(!ms||ms<0)return"0h 00m"; const s=Math.floor(ms/1000); return `${Math.floor(s/3600)}h ${String(Math.floor((s%3600)/60)).padStart(2,"0")}m`; };
const fmtT  = ts=>{ if(!ts)return"--:--"; return new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); };
const fmtD  = ts=>new Date(ts).toLocaleDateString([],{month:"short",day:"numeric"});
const toH   = ms=>ms/3600000;
const $     = n=>parseFloat(n).toFixed(2);
const money = n=>"$"+$(n);
const todayStr = ()=>new Date().toDateString();
const weekStart= ()=>{ const d=new Date(); d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0); return d.getTime(); };

function weekMs(id){ return (sessions[id]||[]).filter(s=>s.start>=weekStart()).reduce((a,s)=>a+(s.end-s.start),0); }
function todayMs(id){ return (sessions[id]||[]).filter(s=>s.date===todayStr()).reduce((a,s)=>a+(s.end-s.start),0); }
function totalTips(id){ return (sessions[id]||[]).reduce((a,s)=>a+(s.tips||0),0); }
function monthMs(id,m,y){ return (sessions[id]||[]).filter(s=>{ const d=new Date(s.start); return d.getMonth()===m&&d.getFullYear()===y; }).reduce((a,s)=>a+(s.end-s.start),0); }
function monthTips(id,m,y){ return (sessions[id]||[]).filter(s=>{ const d=new Date(s.start); return d.getMonth()===m&&d.getFullYear()===y; }).reduce((a,s)=>a+(s.tips||0),0); }
function isOT(id){ return weekMs(id)+(active[id]?Date.now()-active[id]:0)>=OT_MS; }
function nearOT(id){ const w=weekMs(id)+(active[id]?Date.now()-active[id]:0); return w>=OT_MS*0.9&&w<OT_MS; }
function payCalc(emp,ms){ const h=toH(ms),reg=Math.min(h,40),ot=Math.max(0,h-40); return {reg,ot,regPay:reg*emp.rate,otPay:ot*emp.rate*1.5}; }
function allLogs(){ return employees.flatMap(emp=>(sessions[emp.id]||[]).map(s=>({...s,emp}))).sort((a,b)=>b.start-a.start); }

// ── clock ──────────────────────────────────────────────────────────────
setInterval(()=>{
  document.getElementById("clock").textContent = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  // update live timers
  document.querySelectorAll("[data-timer]").forEach(el=>{
    const from=+el.dataset.timer; el.textContent=fmt(Date.now()-from);
  });
  // update pending req badge
  const pending=requests.filter(r=>r.status==="pending").length;
  const rb=document.getElementById("req-btn");
  if(rb) rb.textContent="Requests"+(pending?` (${pending})`:"");
},1000);

// ── navigation ─────────────────────────────────────────────────────────
function goto(v){ view=v; document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active")); render(); }

function render(){
  document.querySelectorAll(".nav-btn").forEach(b=>{ if(b.textContent.toLowerCase().startsWith(view)) b.classList.add("active"); });
  const main=document.getElementById("main");
  main.innerHTML="";
  if(view==="dashboard") renderDashboard(main);
  else if(view==="log")  renderLog(main);
  else if(view==="payroll") renderPayroll(main);
  else if(view==="monthly") renderMonthly(main);
  else if(view==="requests") renderRequests(main);
  else if(view==="add") renderAdd(main);
}

// ── dashboard ──────────────────────────────────────────────────────────
function renderDashboard(root){
  const otCount=employees.filter(e=>isOT(e.id)).length;
  const pending=requests.filter(r=>r.status==="pending").length;
  const todayTips=allLogs().filter(l=>l.date===todayStr()).reduce((a,l)=>a+(l.tips||0),0);
  const activeCount=Object.keys(active).length;

  root.innerHTML=`
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Active Now</div><div class="stat-value">${activeCount}</div></div>
      <div class="stat-card"><div class="stat-label">Total Staff</div><div class="stat-value">${employees.length}</div></div>
      <div class="stat-card ${otCount>0?"warn":""}"><div class="stat-label">Overtime ⚠</div><div class="stat-value">${otCount}</div></div>
      <div class="stat-card gold"><div class="stat-label">Tips Today</div><div class="stat-value" style="color:#ffd166;font-size:20px">${money(todayTips)}</div></div>
    </div>
    <div class="sec"><span>Staff</span><div class="sec-line"></div></div>
    <div class="emp-grid" id="emp-grid"></div>
  `;
  const grid=document.getElementById("emp-grid");
  employees.forEach(emp=>{
    const on=!!active[emp.id];
    const ot=isOT(emp.id), aot=nearOT(emp.id);
    const last=(sessions[emp.id]||[]).slice(-1)[0];
    const tips=totalTips(emp.id);
    const wkNow=weekMs(emp.id)+(on?Date.now()-active[emp.id]:0);
    const tdNow=todayMs(emp.id)+(on?Date.now()-active[emp.id]:0);
    const rc=ROLE_CLR[emp.role]||"#8a9e90";

    const card=document.createElement("div");
    card.className=`emp-card ${ot?"ot-card":on?"active-card":""}`;
    card.innerHTML=`
      <div class="emp-top-bar" style="background:${ot?"#ff6b35":emp.color}"></div>
      ${(ot||aot)?`<div class="ot-banner">⚠ ${ot?"Overtime — over 40h this week":"Approaching 40h limit"}</div>`:""}
      <div class="emp-header">
        <div class="emp-avatar" style="background:${emp.color}28;border:1px solid ${emp.color}55;color:${emp.color}">${emp.name[0]}</div>
        <div style="flex:1;min-width:0">
          <div class="emp-name">${emp.name}</div>
          <div class="emp-role" style="color:${rc}">${emp.role} · $${emp.rate}/h</div>
        </div>
        <div class="emp-badge ${ot?"badge-ot":on?"badge-active":"badge-offline"}">${ot?"⚠ OT":on?"● Active":"Offline"}</div>
      </div>
      <div class="time-grid">
        <div class="time-cell">
          <div class="time-label">Today</div>
          <div class="time-val" ${on?`data-timer="${active[emp.id]-todayMs(emp.id)}"`:""}>
            ${on?fmt(Date.now()-(active[emp.id]-todayMs(emp.id))):fmt(tdNow)}
          </div>
        </div>
        <div class="time-cell">
          <div class="time-label">Week ${ot?"⚠":""}</div>
          <div class="time-val ${ot?"warn":""}" ${on?`data-timer="${active[emp.id]-weekMs(emp.id)}"`:""}>
            ${on?fmt(Date.now()-(active[emp.id]-weekMs(emp.id))):fmt(wkNow)}
          </div>
        </div>
        <div class="time-cell">
          <div class="time-label">Clock In</div>
          <div class="time-val sm">${on?fmtT(active[emp.id]):(last?fmtT(last.start):"—")}</div>
        </div>
        <div class="time-cell">
          <div class="time-label">Tips 💰</div>
          <div class="time-val gold">${money(tips)}</div>
        </div>
      </div>
      <div class="btn-row">
        ${!on
          ?`<button class="btn btn-primary" onclick="clockIn(${emp.id})">Clock In</button>`
          :`<button class="btn btn-secondary" onclick="clockOut(${emp.id})">Clock Out + Tips</button>`
        }
        <button class="btn btn-danger" onclick="removeEmp(${emp.id})">✕</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── log ────────────────────────────────────────────────────────────────
function renderLog(root){
  const logs=allLogs();
  root.innerHTML=`
    <div class="sec"><span>Session Log</span><div class="sec-line"></div><span>${logs.length} entries</span></div>
    ${logs.length===0?`<div class="empty">No sessions yet.</div>`:`
    <div class="tbl">
      <div class="tbl-head cols-log"><span>Employee</span><span>Role</span><span class="h3">Date</span><span>In → Out</span><span class="h4">Duration</span><span class="h5">Tips</span></div>
      ${logs.map((l,i)=>`
        <div class="tbl-row cols-log">
          <div style="display:flex;align-items:center;gap:7px"><div class="dot" style="background:${l.emp.color}"></div>${l.emp.name}</div>
          <span style="color:${ROLE_CLR[l.emp.role]||"#8a9e90"};font-size:11px;font-weight:600" class="h2">${l.emp.role}</span>
          <span style="color:#8a9e90" class="h3">${fmtD(l.start)}</span>
          <span style="color:#8a9e90">${fmtT(l.start)} → ${fmtT(l.end)}</span>
          <span style="color:#00e5a0;font-weight:600" class="h4">${fmt(l.end-l.start)}</span>
          <span style="color:#ffd166;font-weight:600" class="h5">${l.tips>0?money(l.tips):"—"}</span>
        </div>`).join("")}
    </div>`}
  `;
}

// ── payroll ────────────────────────────────────────────────────────────
function renderPayroll(root){
  let totReg=0,totOt=0,totTips=0,totPay=0;
  const rows=employees.map((emp,i)=>{
    const ms=weekMs(emp.id),{reg,ot,regPay,otPay}=payCalc(emp,ms),tips=totalTips(emp.id),total=regPay+otPay+tips;
    totReg+=reg;totOt+=ot;totTips+=tips;totPay+=total;
    return `<div class="tbl-row cols-pay">
      <div style="display:flex;align-items:center;gap:7px"><div class="dot" style="background:${emp.color}"></div>${emp.name}</div>
      <span style="color:${ROLE_CLR[emp.role]||"#8a9e90"};font-size:11px;font-weight:600">${emp.role}</span>
      <span>${$(reg)}h</span>
      <span style="color:${ot>0?"#ff6b35":"#8a9e90"};font-weight:${ot>0?700:400}">${ot>0?`${$(ot)}h ⚠`:"—"}</span>
      <span style="color:#ffd166">${tips>0?money(tips):"—"}</span>
      <span style="color:#00e5a0;font-weight:700">${money(total)}</span>
    </div>`;
  }).join("");
  root.innerHTML=`
    <div class="sec"><span>Weekly Payroll</span><div class="sec-line"></div><button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button></div>
    <div class="tbl">
      <div class="tbl-head cols-pay"><span>Employee</span><span>Role</span><span>Reg Hrs</span><span>OT Hrs</span><span>Tips</span><span>Total Pay</span></div>
      ${rows}
      <div class="tbl-total cols-pay">
        <span style="color:#e8f0ea">TOTAL</span><span></span>
        <span>${$(totReg)}h</span>
        <span style="color:#ff6b35">${$(totOt)}h</span>
        <span style="color:#ffd166">${money(totTips)}</span>
        <span style="color:#00e5a0">${money(totPay)}</span>
      </div>
    </div>
    <div style="font-size:11px;color:#8a9e90;margin-top:12px;text-align:center">Overtime at 1.5× after 40h/week · Current week only</div>
  `;
}

// ── monthly ────────────────────────────────────────────────────────────
function renderMonthly(root){
  const selHtml=(arr,sel,fn)=>arr.map((v,i)=>`<option value="${i}" ${i===sel?"selected":""}>${v}</option>`).join("");
  const yrs=[2024,2025,2026,2027];
  let totH=0,totTips=0,totPay=0;
  const rows=employees.map(emp=>{
    const ms=monthMs(emp.id,monthSel,yearSel),{reg,ot,regPay,otPay}=payCalc(emp,ms),tips=monthTips(emp.id,monthSel,yearSel),total=regPay+otPay+tips;
    totH+=toH(ms);totTips+=tips;totPay+=total;
    return `<div class="tbl-row cols-mon">
      <div style="display:flex;align-items:center;gap:7px"><div class="dot" style="background:${emp.color}"></div>${emp.name}</div>
      <span style="color:${ROLE_CLR[emp.role]||"#8a9e90"};font-size:11px;font-weight:600">${emp.role}</span>
      <span style="color:#00e5a0;font-weight:600">${$(toH(ms))}h${ot>0?` <span style="color:#ff6b35">(+${$(ot)} OT)</span>`:""}</span>
      <span style="color:#ffd166">${tips>0?money(tips):"—"}</span>
      <span style="color:#e8f0ea;font-weight:700">${money(total)}</span>
    </div>`;
  }).join("");
  root.innerHTML=`
    <div class="sec">
      <span>Monthly Report</span><div class="sec-line"></div>
      <select onchange="monthSel=+this.value;renderMonthly(document.getElementById('main'))" style="width:auto;padding:5px 10px;margin-bottom:0;font-size:12px">${MONTHS.map((m,i)=>`<option value="${i}" ${i===monthSel?"selected":""}>${m}</option>`).join("")}</select>
      <select onchange="yearSel=+this.value;renderMonthly(document.getElementById('main'))" style="width:auto;padding:5px 10px;margin-bottom:0;font-size:12px">${yrs.map(y=>`<option value="${y}" ${y===yearSel?"selected":""}>${y}</option>`).join("")}</select>
      <button class="export-btn" onclick="exportMonthCSV()">⬇ CSV</button>
    </div>
    <div class="tbl">
      <div class="tbl-head cols-mon"><span>Employee</span><span>Role</span><span>Hours</span><span>Tips</span><span>Est. Pay</span></div>
      ${rows}
      <div class="tbl-total cols-mon">
        <span style="color:#e8f0ea">TOTAL</span><span></span>
        <span style="color:#00e5a0">${$(totH)}h</span>
        <span style="color:#ffd166">${money(totTips)}</span>
        <span style="color:#00e5a0">${money(totPay)}</span>
      </div>
    </div>
    <div style="font-size:11px;color:#8a9e90;margin-top:12px;text-align:center">${MONTHS[monthSel]} ${yearSel} · Overtime at 1.5× per weekly period</div>
  `;
}

// ── requests ───────────────────────────────────────────────────────────
function renderRequests(root){
  const empOpts=employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join("");
  const rows=[...requests].sort((a,b)=>b.submitted-a.submitted).map(req=>{
    const emp=employees.find(e=>e.id===+req.empId);
    return `<div class="tbl-row cols-req">
      <div style="display:flex;align-items:center;gap:7px">${emp?`<div class="dot" style="background:${emp.color}"></div>`:""}<span>${emp?emp.name:"?"}</span></div>
      <span style="color:#8a9e90">${req.from}</span>
      <span style="color:#8a9e90">${req.to}</span>
      <span style="color:#8a9e90;font-size:11px">${req.reason||"—"}</span>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        <span class="pill pill-${req.status}">${req.status}</span>
        ${req.status==="pending"?`
          <button class="btn-sm" style="background:#00e5a018;color:#00e5a0" onclick="updateReq(${req.id},'approved');render()">✓</button>
          <button class="btn-sm" style="background:#ff6b3518;color:#ff6b35" onclick="updateReq(${req.id},'declined');render()">✗</button>`:""
        }
        <button class="btn-sm" style="background:transparent;color:#8a9e90" onclick="deleteReq(${req.id});render()">🗑</button>
      </div>
    </div>`;
  }).join("");
  root.innerHTML=`
    <div class="sec"><span>Day Off Requests</span><div class="sec-line"></div><span>${requests.filter(r=>r.status==="pending").length} pending</span></div>
    <div class="form-box wide" style="margin:0 0 22px">
      <div style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8a9e90;font-weight:700;margin-bottom:14px">New Request</div>
      <div class="form-grid">
        <div><label>Staff Member</label><select id="req-emp"><option value="">Select…</option>${empOpts}</select></div>
        <div><label>Reason</label><input id="req-reason" placeholder="e.g. Personal, Vacation"/></div>
        <div><label>From Date</label><input type="date" id="req-from"/></div>
        <div><label>To Date</label><input type="date" id="req-to"/></div>
      </div>
      <button class="btn btn-blue" style="flex:none;padding:10px 22px;width:auto" onclick="submitReq()">Submit Request</button>
    </div>
    ${requests.length===0?`<div class="empty">No requests yet.</div>`:`
    <div class="tbl">
      <div class="tbl-head cols-req"><span>Employee</span><span>From</span><span>To</span><span class="h3">Reason</span><span>Status</span></div>
      ${rows}
    </div>`}
  `;
}

// ── add staff ──────────────────────────────────────────────────────────
function renderAdd(root){
  const roleOpts=ROLES.map(r=>`<option value="${r}">${r}</option>`).join("");
  root.innerHTML=`
    <div class="sec"><span>Add Staff Member</span><div class="sec-line"></div></div>
    <div class="form-box">
      <label>Full Name</label>
      <input id="new-name" placeholder="e.g. Jordan Taylor"/>
      <label>Role</label>
      <select id="new-role">${roleOpts}</select>
      <label>Hourly Rate ($)</label>
      <input type="number" id="new-rate" placeholder="e.g. 14.50" min="0" step="0.5"/>
      <button class="btn btn-primary" style="width:100%;padding:12px 0;font-size:12px" onclick="addEmp()">Add Staff Member</button>
    </div>
  `;
}

// ── actions ────────────────────────────────────────────────────────────
function clockIn(id){
  active[id]=Date.now();
  save("h_active",active);
  render();
}

function clockOut(id){
  const emp=employees.find(e=>e.id===id);
  if(!emp||!active[id]) return;
  tipTarget=id;
  document.getElementById("tip-name").textContent="Tips for "+emp.name+" this session";
  document.getElementById("tip-input").value="";
  document.getElementById("tip-modal").classList.add("show");
  setTimeout(()=>document.getElementById("tip-input").focus(),100);
}

function saveTips(override){
  if(tipTarget===null) return;
  const id=tipTarget;
  const tips=override===0?0:(parseFloat(document.getElementById("tip-input").value)||0);
  const start=active[id], end=Date.now();
  if(!sessions[id]) sessions[id]=[];
  sessions[id].push({start,end,date:todayStr(),tips});
  delete active[id];
  save("h_sess",sessions);
  save("h_active",active);
  document.getElementById("tip-modal").classList.remove("show");
  tipTarget=null;
  render();
}

function removeEmp(id){
  if(!confirm("Remove this staff member?")) return;
  employees=employees.filter(e=>e.id!==id);
  delete sessions[id];
  delete active[id];
  save("h_emps",employees);
  save("h_sess",sessions);
  save("h_active",active);
  render();
}

function addEmp(){
  const name=document.getElementById("new-name").value.trim();
  if(!name) return;
  const role=document.getElementById("new-role").value;
  const rate=parseFloat(document.getElementById("new-rate").value)||13;
  const id=Date.now();
  const color=PALETTES[employees.length%PALETTES.length];
  employees.push({id,name,role,color,rate});
  save("h_emps",employees);
  view="dashboard";
  render();
}

function updateReq(id,status){
  requests=requests.map(r=>r.id===id?{...r,status}:r);
  save("h_reqs",requests);
}

function deleteReq(id){
  requests=requests.filter(r=>r.id!==id);
  save("h_reqs",requests);
}

function submitReq(){
  const empId=document.getElementById("req-emp").value;
  const from=document.getElementById("req-from").value;
  const to=document.getElementById("req-to").value;
  const reason=document.getElementById("req-reason").value;
  if(!empId||!from||!to){ alert("Please fill in all required fields."); return; }
  requests.push({id:Date.now(),empId:+empId,from,to,reason,status:"pending",submitted:Date.now()});
  save("h_reqs",requests);
  render();
}

function exportCSV(){
  const rows=[["Employee","Role","Rate","Reg Hours","OT Hours","Reg Pay","OT Pay","Tips","Total"]];
  employees.forEach(emp=>{
    const ms=weekMs(emp.id),{reg,ot,regPay,otPay}=payCalc(emp,ms),tips=totalTips(emp.id);
    rows.push([emp.name,emp.role,"$"+emp.rate,$(reg),$(ot),money(regPay),money(otPay),money(tips),money(regPay+otPay+tips)]);
  });
  dl(rows,"payroll-"+new Date().toISOString().slice(0,10)+".csv");
}

function exportMonthCSV(){
  const rows=[["Employee","Role","Hours","Tips","Reg Pay","OT Pay","Total"]];
  employees.forEach(emp=>{
    const ms=monthMs(emp.id,monthSel,yearSel),{reg,ot,regPay,otPay}=payCalc(emp,ms),tips=monthTips(emp.id,monthSel,yearSel);
    rows.push([emp.name,emp.role,$(toH(ms)),money(tips),money(regPay),money(otPay),money(regPay+otPay+tips)]);
  });
  dl(rows,`monthly-${MONTHS[monthSel]}-${yearSel}.csv`);
}

function dl(rows,fname){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([rows.map(r=>r.join(",")).join("\n")],{type:"text/csv"}));
  a.download=fname; a.click();
}

// ── boot ───────────────────────────────────────────────────────────────
render();
</script>
